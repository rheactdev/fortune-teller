<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link type="image/svg+xml" rel="icon" href="icons8-clock.svg">
  <title>Audentus</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tsparticles@2.12.0/tsparticles.bundle.min.js"></script>

  <style>
    @font-face {
      font-family: 'Liber Grotesque';
      src: url('fonts/Liber v2 WebFonts/Regular/LiberGrotesqueFamily-Regular.woff') format('woff');
      font-weight: normal;
      font-style: normal;
    }

    @font-face {
      font-family: 'Liber Grotesque';
      src: url('fonts/Liber v2 WebFonts/Regular/LiberGrotesqueFamily-Oblique.woff') format('woff');
      font-weight: normal;
      font-style: italic;
    }

    @font-face {
      font-family: 'Liber Grotesque';
      src: url('fonts/Liber v2 WebFonts/SemiBold/LiberGrotesqueFamily-SemiBold.woff') format('woff');
      font-weight: 600;
      font-style: normal;
    }

    @font-face {
      font-family: 'Catchy Mager';
      src: url('fonts/catchy-mager/Catchy Mager.otf') format('opentype');
      font-weight: normal;
      font-style: normal;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --orb-idle1: #ede0ff;
      --orb-idle2: #c4a0f8;
      --orb-idle3: #7c50d8;
      --orb-yes1: #b8f0c0;
      --orb-yes2: #60c878;
      --orb-yes3: #1a7030;
      --orb-no1: #ffc0c0;
      --orb-no2: #e07070;
      --orb-no3: #8a2020;
      --orb-maybe1: #fff0a0;
      --orb-maybe2: #e8c030;
      --orb-maybe3: #806000;
      --glow-idle: rgba(160, 100, 255, 0.45);
      --glow-yes: rgba(60, 180, 80, 0.45);
      --glow-no: rgba(220, 60, 60, 0.45);
      --glow-maybe: rgba(220, 180, 20, 0.45);
      --answer-yes: #2a8a40;
      --answer-no: #c03030;
      --answer-maybe: #8a6000;
      --bg: #0d0a1a;
      --text: #ddd3fd;
      --text-muted: #9282bc;
      --text-hint: #4e3a7d;
      --input-bg: rgba(255, 255, 255, 0.06);
      --input-border: rgba(180, 140, 255, 0.3);
      --input-focus: rgba(180, 140, 255, 0.7);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Liber Grotesque', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      overflow-x: hidden;
    }

    /* Starfield background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 20%, rgba(100, 60, 200, 0.15) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 80%, rgba(60, 20, 120, 0.2) 0%, transparent 60%),
        radial-gradient(ellipse at 50% 0%, rgba(140, 80, 255, 0.1) 0%, transparent 50%);
      pointer-events: none;
    }

    #tsparticles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .app {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 520px;
    }

    .title {
      font-family: 'Catchy Mager', serif;
      font-size: 32px;
      letter-spacing: 4px;
      color: var(--text);
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 15px;
      color: var(--text-muted);
      /* letter-spacing: 1px; */
      margin-bottom: 2.5rem;
    }

    /* ORB */
    .orb-wrap {
      position: relative;
      width: 240px;
      height: 240px;
      cursor: pointer;
      animation: float 3.5s ease-in-out infinite;
      margin-bottom: 1rem;
      -webkit-tap-highlight-color: transparent;
    }

    .orb-wrap.shaking {
      animation: shake 0.55s ease-in-out forwards;
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0px);
      }

      50% {
        transform: translateY(-10px);
      }
    }

    @keyframes shake {

      0%,
      100% {
        transform: translateX(0);
      }

      15% {
        transform: translateX(-8px) rotate(-1deg);
      }

      30% {
        transform: translateX(8px) rotate(1deg);
      }

      45% {
        transform: translateX(-6px);
      }

      60% {
        transform: translateX(6px);
      }

      75% {
        transform: translateX(-3px);
      }

      90% {
        transform: translateX(3px);
      }
    }

    /* Glow ring */
    .orb-glow {
      position: absolute;
      inset: -20px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--glow-idle) 0%, transparent 70%);
      transition: background 0.8s ease;
      animation: pulse 3.5s ease-in-out infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        transform: scale(1);
        opacity: 0.7;
      }

      50% {
        transform: scale(1.08);
        opacity: 1;
      }
    }

    .orb-svg {
      width: 240px;
      height: 240px;
      display: block;
      position: relative;
      z-index: 1;
      filter: drop-shadow(0 8px 32px rgba(120, 60, 255, 0.4));
      transition: filter 0.8s ease;
    }



    .lottie-layer {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 2;
    }

    .clouds-layer {
      width: 200px;
      height: 200px;
      clip-path: circle(88px at 100px 100px);
      opacity: 0.12;
      filter: invert(1) brightness(2) blur(1px);
      z-index: 1;
    }

    .sparkles-layer {
      width: 40px;
      height: 40px;
      margin-top: -15px;
      margin-left: 10px;
      filter: invert(1) brightness(1.8) blur(0.3px);
      opacity: 0.6;
      mix-blend-mode: screen;
      z-index: 3;
    }

    #lottie-bg-sparkles {
      width: 80px;
      height: 80px;
      filter: invert(1) brightness(1.2);
      opacity: 0.2;
      z-index: 0;
    }

    .sparkle-icon {
      display: inline-block;
      width: 22px;
      height: 22px;
      vertical-align: middle;
      margin-left: 2px;
    }

    .sparkle-icon svg path {
      fill: currentColor !important;
    }

    /* Answer area */
    .answer-area {
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 1.5rem 0 1rem;
      padding: 0 1rem;
      text-align: center;
    }

    .idle-msg {
      font-size: 17px;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .answer-text {
      font-family: 'Catchy Mager', serif;
      font-size: 24px;
      font-weight: 600;
      letter-spacing: 1px;
      line-height: 1.4;
      animation: reveal 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes reveal {
      0% {
        opacity: 0;
        transform: scale(0.6) translateY(8px);
      }

      100% {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .question-echo {
      font-size: 15px;
      color: var(--text-hint);
      font-style: italic;
      margin-top: 0.5rem;
      animation: fadeIn 0.4s ease both 0.3s;
      opacity: 0;
      animation-fill-mode: forwards;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
      }
    }

    /* Input */
    .input-row {
      display: flex;
      gap: 8px;
      width: 100%;
      margin-top: 0.5rem;
    }

    .q-input {
      flex: 1;
      padding: 13px 20px;
      border-radius: 999px;
      border: 1.5px solid var(--input-border);
      background: var(--input-bg);
      color: var(--text);
      font-family: 'Liber Grotesque', sans-serif;
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
      backdrop-filter: blur(8px);
    }

    .q-input::placeholder {
      color: var(--text-hint);
    }

    .q-input:focus {
      border-color: var(--input-focus);
      background: rgba(255, 255, 255, 0.09);
    }

    .ask-btn {
      padding: 13px 24px;
      border-radius: 999px;
      border: none;
      background: linear-gradient(135deg, #a070f0 0%, #c090ff 100%);
      color: white;
      font-family: 'Liber Grotesque', sans-serif;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: transform 0.15s, opacity 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(160, 100, 255, 0.4);
      white-space: nowrap;
    }

    .ask-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 28px rgba(160, 100, 255, 0.6);
    }

    .ask-btn:active {
      transform: scale(0.97);
    }

    /* Legend */
    .legend {
      display: flex;
      gap: 18px;
      margin-top: 1.75rem;
      font-size: 14px;
      color: var(--text-hint);
      align-items: center;
      letter-spacing: 0.5px;
    }

    .dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      margin-right: 5px;
      vertical-align: middle;
    }

    .dot-yes {
      background: #60c878;
    }

    .dot-maybe {
      background: #e8c030;
    }

    .dot-no {
      background: #e07070;
    }

    .divider {
      width: 1px;
      height: 14px;
      background: rgba(255, 255, 255, 0.1);
    }

    /* Base stand shadow */
    .base-shadow {
      position: absolute;
      bottom: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 14px;
      background: radial-gradient(ellipse, rgba(80, 40, 180, 0.5) 0%, transparent 70%);
      border-radius: 50%;
    }
  </style>
</head>

<body>

  <div id="tsparticles"></div>

  <div class="app">
    <p class="title">Crystal Ball</p>
    <p class="subtitle">Your destiny awaits.</p>

    <div style="position:relative">
      <div class="orb-wrap" id="orb" onclick="shake()" title="Tap to reveal your fate">
        <div class="orb-glow" id="orbGlow"></div>

        <!-- Lottie Layers -->
        <div id="lottie-clouds" class="lottie-layer clouds-layer"></div>
        <div id="lottie-sparkles" class="lottie-layer sparkles-layer"></div>

        <svg class="orb-svg" id="orbSvg" viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <radialGradient id="g1" cx="38%" cy="33%" r="62%">
              <stop offset="0%" stop-color="#ede0ff" id="gs0" />
              <stop offset="42%" stop-color="#c4a0f8" id="gs1" />
              <stop offset="100%" stop-color="#7c50d8" id="gs2" />
            </radialGradient>
            <radialGradient id="shine" cx="32%" cy="28%" r="42%">
              <stop offset="0%" stop-color="white" stop-opacity="0.55" />
              <stop offset="100%" stop-color="white" stop-opacity="0" />
            </radialGradient>
            <radialGradient id="innerGlow" cx="50%" cy="55%" r="50%">
              <stop offset="0%" stop-color="#c0a0ff" stop-opacity="0.25" />
              <stop offset="100%" stop-color="#8060e0" stop-opacity="0" />
            </radialGradient>
            <clipPath id="orbClip">
              <circle cx="120" cy="112" r="88" />
            </clipPath>
            <filter id="softBlur">
              <feGaussianBlur stdDeviation="2" />
            </filter>
          </defs>

          <!-- Outer halo -->
          <circle cx="120" cy="112" r="100" fill="#a080e0" fill-opacity="0.08" />
          <circle cx="120" cy="112" r="95" fill="none" stroke="#c0a0f8" stroke-width="1" stroke-opacity="0.2" />

          <!-- Main orb -->
          <circle cx="120" cy="112" r="88" fill="url(#g1)" />

          <!-- Inner content (clouds, stars) -->
          <!-- Lottie will handle clouds and stars -->
          </g>

          <!-- Shine overlay -->
          <circle cx="120" cy="112" r="88" fill="url(#shine)" />
          <circle cx="120" cy="112" r="88" fill="url(#innerGlow)" />

          <!-- Highlight -->
          <ellipse cx="98" cy="80" rx="26" ry="13" fill="white" fill-opacity="0.18" transform="rotate(-28 98 80)" />

          <!-- Stand -->
          <ellipse cx="120" cy="205" rx="50" ry="10" fill="#3a2870" fill-opacity="0.5" />
          <path d="M80 198 Q72 208 68 214 Q90 214 104 207Z" fill="#5a4090" />
          <path d="M160 198 Q168 208 172 214 Q150 214 136 207Z" fill="#5a4090" />
          <rect x="96" y="194" width="48" height="14" rx="5" fill="#5a4090" />
          <ellipse cx="120" cy="194" rx="40" ry="9" fill="#7060b0" />
          <ellipse cx="120" cy="192" rx="38" ry="7" fill="#9080c8" />

          <!-- Crescent -->
          <text x="120" y="175" text-anchor="middle" font-size="10" fill="#c0b0f0" fill-opacity="0.6"
            font-family="'Liber Grotesque'">☽</text>
        </svg>

        <div class="base-shadow"></div>
      </div>

      <!-- Floating Lottie Sparkles -->
      <div id="lottie-bg-sparkles" class="lottie-layer"></div>
    </div>

    <div class="answer-area" id="answerArea">
      <div class="idle-msg" id="idleMsg">Ask a question or<br>tap the orb to reveal your fate</div>
      <div style="display:none" id="answerBlock">
        <div class="answer-text" id="answerText"></div>
        <div class="question-echo" id="questionEcho"></div>
      </div>
    </div>

    <div class="input-row">
      <input class="q-input" type="text" id="qInput" placeholder="Will I get the job? Am I lucky today?" maxlength="120"
        onkeydown="if(event.key==='Enter')askQ()">
      <button class="ask-btn" onclick="askQ()">Ask <span class="sparkle-icon"></span></button>
    </div>

    <div class="legend">
      <span><span class="dot dot-yes"></span>yes</span>
      <div class="divider"></div>
      <span><span class="dot dot-maybe"></span>maybe</span>
      <div class="divider"></div>
      <span><span class="dot dot-no"></span>no</span>
      <div class="divider"></div>
      <span>15 answers</span>
    </div>
  </div>

  <style>
    @keyframes cloudDrift {

      0%,
      100% {
        transform: translateX(0)
      }

      50% {
        transform: translateX(5px)
      }
    }
  </style>

  <script>
    let busy = false;

    const ANSWERS = [
      { text: "The stars say yes <span class=\"sparkle-icon\"></span>", cat: "yes" },
      { text: "Without a doubt <span class=\"sparkle-icon\"></span>", cat: "yes" },
      { text: "It is certain <span class=\"sparkle-icon\"></span>", cat: "yes" },
      { text: "The cosmos align for you <span class=\"sparkle-icon\"></span>", cat: "yes" },
      { text: "Signs point to yes <span class=\"sparkle-icon\"></span>", cat: "yes" },
      { text: "As I see it, yes <span class=\"sparkle-icon\"></span>", cat: "yes" },
      { text: "The spirits whisper... maybe", cat: "maybe" },
      { text: "The mist clouds my vision", cat: "maybe" },
      { text: "Ask again under the moon", cat: "maybe" },
      { text: "The fates are undecided", cat: "maybe" },
      { text: "The stars remain silent", cat: "maybe" },
      { text: "The orb sees no <span class=\"sparkle-icon\"></span>", cat: "no" },
      { text: "The cosmos say no", cat: "no" },
      { text: "My vision says no <span class=\"sparkle-icon\"></span>", cat: "no" },
      { text: "Do not count on it <span class=\"sparkle-icon\"></span>", cat: "no" },
    ];

    const COLORS = {
      yes: { s0: "#b8f0c0", s1: "#60c878", s2: "#1a7030", glow: "rgba(60,180,80,0.45)", drop: "rgba(40,160,60,0.5)", text: "#40c860" },
      no: { s0: "#ffc0c0", s1: "#e07070", s2: "#8a2020", glow: "rgba(220,60,60,0.45)", drop: "rgba(200,40,40,0.5)", text: "#e06060" },
      maybe: { s0: "#fff0a0", s1: "#e8c030", s2: "#806000", glow: "rgba(220,180,20,0.45)", drop: "rgba(200,160,10,0.5)", text: "#d4aa20" },
      idle: { s0: "#ede0ff", s1: "#c4a0f8", s2: "#7c50d8", glow: "rgba(160,100,255,0.45)", drop: "rgba(120,60,255,0.4)", text: "#c0a0ff" },
    };

    function loadSparkles(container = document) {
      container.querySelectorAll('.sparkle-icon').forEach(el => {
        if (el.hasChildNodes()) return; // Already loaded
        lottie.loadAnimation({
          container: el,
          renderer: 'svg',
          loop: true,
          autoplay: true,
          path: 'icons8-sparkle.json'
        });
      });
    }

    // Lottie Initializations
    loadSparkles();

    const cloudAnim = lottie.loadAnimation({
      container: document.getElementById('lottie-clouds'),
      renderer: 'svg',
      loop: true,
      autoplay: true,
      path: 'icons8-cloud.json'
    });

    const sparkleAnim = lottie.loadAnimation({
      container: document.getElementById('lottie-sparkles'),
      renderer: 'svg',
      loop: true,
      autoplay: true,
      path: 'icons8-sparkle.json'
    });

    const bgSparkleAnim = lottie.loadAnimation({
      container: document.getElementById('lottie-bg-sparkles'),
      renderer: 'svg',
      loop: true,
      autoplay: true,
      path: 'icons8-sparkle.json'
    });

    // Starfield with tsParticles
    tsParticles.load("tsparticles", {
      fullScreen: { enable: false },
      particles: {
        number: { value: 120, density: { enable: true, area: 800 } },
        color: { value: "#ffffff" },
        shape: { type: "circle" },
        opacity: {
          value: { min: 0.1, max: 0.8 },
          animation: { enable: true, speed: 1, sync: false }
        },
        size: { value: { min: 1, max: 2.5 } },
        move: {
          enable: true,
          speed: 0.3,
          direction: "none",
          random: true,
          straight: false,
          outModes: { default: "out" }
        }
      },
      interactivity: {
        events: { onHover: { enable: true, mode: "bubble" } },
        modes: { bubble: { size: 5, distance: 100, duration: 2, opacity: 1, color: "#c0a0ff" } }
      },
      retina_detect: true
    });

    function setOrbColor(cat) {
      const c = COLORS[cat];
      document.getElementById('gs0').setAttribute('stop-color', c.s0);
      document.getElementById('gs1').setAttribute('stop-color', c.s1);
      document.getElementById('gs2').setAttribute('stop-color', c.s2);
      document.getElementById('orbGlow').style.background = `radial-gradient(circle, ${c.glow} 0%, transparent 70%)`;
      document.getElementById('orbSvg').style.filter = `drop-shadow(0 8px 32px ${c.drop})`;
    }

    function revealAnswer(question) {
      if (busy) return;
      busy = true;

      const orb = document.getElementById('orb');
      orb.classList.add('shaking');
      setTimeout(() => orb.classList.remove('shaking'), 550);

      const idleMsg = document.getElementById('idleMsg');
      const answerBlock = document.getElementById('answerBlock');
      const answerText = document.getElementById('answerText');
      const questionEcho = document.getElementById('questionEcho');

      idleMsg.style.display = 'none';
      answerBlock.style.display = 'none';

      setTimeout(() => {
        const pick = ANSWERS[Math.floor(Math.random() * ANSWERS.length)];
        setOrbColor(pick.cat);

        const c = COLORS[pick.cat];
        answerText.style.color = c.text;
        answerText.style.textShadow = `0 0 20px ${c.glow}`;
        answerText.innerHTML = pick.text;
        loadSparkles(answerText);

        if (question) {
          questionEcho.textContent = `"${question.length > 50 ? question.slice(0, 47) + '...' : question}"`;
          questionEcho.style.display = 'block';
        } else {
          questionEcho.style.display = 'none';
        }

        // Re-trigger animation
        answerText.style.animation = 'none';
        answerText.offsetHeight;
        answerText.style.animation = '';

        answerBlock.style.display = 'block';
        busy = false;
      }, 560);
    }

    function shake() {
      const q = document.getElementById('qInput').value.trim();
      revealAnswer(q || null);
    }

    function askQ() {
      const q = document.getElementById('qInput').value.trim();
      revealAnswer(q || null);
      document.getElementById('qInput').value = '';
    }
  </script>
</body>

</html>
